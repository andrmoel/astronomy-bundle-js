name: 'Release new version'

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Use node.js'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: 'Prepare git'
        run: |
          git config --global user.email "noreply@github.com"
          git config --global user.name "github version update"
          git branch -u origin/master master

      - name: 'Install project'
        run: yarn install

      - name: 'Check code style'
        run: yarn lint

#      - name: 'Run unit tests'
#        run: yarn test

      - name: 'Upload code coverage'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 'Increase version'
        run: yarn release

      - name: 'Build project'
        run: yarn build

      - name: 'Push version to git'
        run: yarn release:push

      - name: 'Publish releases to npm'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          mapfile -t packages < <(node_modules/.bin/tsx --eval "const m = require('./packages.config.ts'); process.stdout.write(m.default.join('\n'))")
          for pkg in "${packages[@]}"; do
            npm publish "./$pkg/dist" --access public
          done
